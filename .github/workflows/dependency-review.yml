name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          retry-on-snapshot-warnings: true
          config-file: ".github/dependency-review-config.yml"
